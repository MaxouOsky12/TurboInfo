<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinuteBrief | L'essentiel en 60s</title>
    <style>
        /* =========================================================
           VARIABLES & RESET
           ========================================================= */
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --card-bg: #f9f9f9;
            --border-color: #eeeeee;
            --accent-color: #000000;
            --badge-bg: #e0e0e0;
            --skeleton-bg: #e2e5e7;
            --skeleton-shine: #f6f7f8;
            
            /* Importance colors */
            --imp-haute: #ffebee;
            --imp-haute-text: #c62828;
            --imp-moyenne: #fff3e0;
            --imp-moyenne-text: #ef6c00;
            --imp-faible: #e8f5e9;
            --imp-faible-text: #2e7d32;

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Dark Mode variables */
        body.dark-mode {
            --bg-color: #121212;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --accent-color: #ffffff;
            --badge-bg: #333333;
            --skeleton-bg: #2a2a2a;
            --skeleton-shine: #3a3a3a;
            
            --imp-haute: #4a1c1c;
            --imp-haute-text: #ff8a80;
            --imp-moyenne: #4d2c10;
            --imp-moyenne-text: #ffd180;
            --imp-faible: #1b3a1e;
            --imp-faible-text: #b9f6ca;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================================
           LAYOUT & HEADER
           ========================================================= */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            border-color: var(--text-muted);
        }

        button.active {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
        }

        .filter-row {
            display: flex;
            gap: 10px;
        }

        /* =========================================================
           CARDS (BRIEFS)
           ========================================================= */
        #feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            background: var(--badge-bg);
            color: var(--text-main);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge.haute { background: var(--imp-haute); color: var(--imp-haute-text); }
        .badge.moyenne { background: var(--imp-moyenne); color: var(--imp-moyenne-text); }
        .badge.faible { background: var(--imp-faible); color: var(--imp-faible-text); }

        .date {
            color: var(--text-muted);
            font-weight: 500;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .tldr {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 15px;
            border-left: 3px solid var(--text-muted);
            padding-left: 10px;
        }

        .details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .points {
            list-style-type: none;
            margin-bottom: 15px;
        }

        .points li {
            position: relative;
            padding-left: 15px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .points li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--text-muted);
            font-weight: bold;
        }

        .why-it-matters {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            border: 1px solid var(--border-color);
        }

        .why-label {
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* 10 Seconds Mode Toggle */
        body.mode-10s .details {
            display: none;
        }

        /* =========================================================
           SKELETON LOADING
           ========================================================= */
        .skeleton {
            background: var(--skeleton-bg);
            background-image: linear-gradient(
                90deg, 
                var(--skeleton-bg) 0px, 
                var(--skeleton-shine) 40px, 
                var(--skeleton-bg) 80px
            );
            background-size: 200% 100%;
            animation: shine 1.5s infinite ease-out;
            border-radius: 4px;
        }

        .sk-card { height: 200px; border-radius: 12px; margin-bottom: 20px; }

        @keyframes shine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .error-msg {
            text-align: center;
            color: var(--imp-haute-text);
            padding: 20px;
            background: var(--imp-haute);
            border-radius: 8px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .filter-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="header-top">
            <h1>MinuteBrief</h1>
            <div class="controls">
                <button id="btn-10s" title="Mode 10 secondes (TL;DR uniquement)">⚡ 10s</button>
                <button id="btn-dark" title="Mode Sombre">🌙</button>
            </div>
        </div>
        <div class="filters">
            <input type="text" id="search-input" placeholder="Rechercher un sujet..." autocomplete="off">
            <div class="filter-row">
                <select id="filter-category">
                    <option value="">Toutes les catégories</option>
                </select>
                <select id="filter-importance">
                    <option value="">Toutes les importances</option>
                    <option value="haute">Haute</option>
                    <option value="moyenne">Moyenne</option>
                    <option value="faible">Faible</option>
                </select>
            </div>
        </div>
    </header>

    <main id="feed">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
    </main>
</div>

<script>
    /* =========================================================
       CONFIGURATION & VARIABLES
       ========================================================= */
    // ⚠️ REMPLACE CECI PAR L'ID DE TON GOOGLE SHEET
    const SHEET_ID = "1a2b3c4d5e6f7g8h9i0j-EXEMPLE-REMPLACER"; 
    
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    let briefsData = [];
    let categories = new Set();

    // DOM Elements
    const feedEl = document.getElementById('feed');
    const searchInput = document.getElementById('search-input');
    const filterCat = document.getElementById('filter-category');
    const filterImp = document.getElementById('filter-importance');
    const btn10s = document.getElementById('btn-10s');
    const btnDark = document.getElementById('btn-dark');

    /* =========================================================
       SÉCURITÉ & SANITIZATION
       ========================================================= */
    // Supprime toute forme d'URL pour empêcher le phishing ou l'injection
    function sanitizeText(str) {
        if (!str) return "";
        // Regex stricte pour attraper http, https, www, et les TLDs courants
        const urlRegex = /((https?:\/\/)|(www\.))[^\s]+|[a-zA-Z0-9\-\.]+\.[a-zA-Z]{2,}(\/[^\s]*)?/gi;
        return str.replace(urlRegex, '[Lien masqué]');
    }

    // Crée un élément DOM en utilisant uniquement textContent (Anti-XSS absolu)
    function createSafeElement(tag, className, text = "") {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text) el.textContent = sanitizeText(text);
        return el;
    }

    /* =========================================================
       PARSING CSV VANILLA (Anti-Casse)
       ========================================================= */
    function parseCSV(text) {
        const result = [];
        let p = '', row = [''], i = 0, r = 0, s = !0, l;
        for (l of text) {
            if ('"' === l) {
                if (s && l === p) row[i] += l;
                s = !s;
            } else if (',' === l && s) {
                l = row[++i] = '';
            } else if ('\n' === l && s) {
                if ('\r' === p) row[i] = row[i].slice(0, -1);
                result[++r] = [l = row[i = 0] = ''];
            } else row[i] += l;
            p = l;
        }
        
        // Mapping manuel des colonnes demandées
        const headers = result[0].map(h => h.trim().toLowerCase());
        const mappedData = [];

        for (let j = 1; j < result.length; j++) {
            if (result[j].length < 2 || !result[j][0]) continue;
            const obj = {};
            headers.forEach((header, index) => {
                obj[header] = result[j][index] ? result[j][index].trim() : "";
            });
            mappedData.push(obj);
        }
        return mappedData;
    }

    /* =========================================================
       LOGIQUE D'AFFICHAGE & RENDU DOM
       ========================================================= */
    function renderFeed(data) {
        feedEl.innerHTML = ''; // Seul innerHTML autorisé (nettoyage de conteneur sûr)
        
        if (data.length === 0) {
            feedEl.appendChild(createSafeElement('div', 'error-msg', 'Aucun brief trouvé pour ces critères.'));
            return;
        }

        data.forEach(item => {
            // Card Container
            const card = createSafeElement('article', 'card');

            // Header (Catégorie, Importance, Date)
            const header = createSafeElement('div', 'card-header');
            const badges = createSafeElement('div', 'badges');
            
            if (item.category) {
                badges.appendChild(createSafeElement('span', 'badge', item.category));
            }
            
            if (item.importance) {
                const impClass = item.importance.toLowerCase();
                const safeClass = ['haute', 'moyenne', 'faible'].includes(impClass) ? impClass : '';
                badges.appendChild(createSafeElement('span', `badge ${safeClass}`, item.importance));
            }
            
            header.appendChild(badges);
            header.appendChild(createSafeElement('span', 'date', item.date));
            card.appendChild(header);

            // Titre & TL;DR
            card.appendChild(createSafeElement('h2', 'title', item.title));
            card.appendChild(createSafeElement('p', 'tldr', item.tldr));

            // Détails (Masqués en mode 10s)
            const details = createSafeElement('div', 'details');
            const ul = createSafeElement('ul', 'points');
            
            ['point1', 'point2', 'point3'].forEach(pt => {
                if (item[pt]) {
                    ul.appendChild(createSafeElement('li', '', item[pt]));
                }
            });
            details.appendChild(ul);

            if (item.why_it_matters) {
                const whyBox = createSafeElement('div', 'why-it-matters');
                whyBox.appendChild(createSafeElement('span', 'why-label', 'Pourquoi ça compte'));
                whyBox.appendChild(createSafeElement('span', '', item.why_it_matters));
                details.appendChild(whyBox);
            }

            card.appendChild(details);
            feedEl.appendChild(card);
        });
    }

    /* =========================================================
       FILTRES & RECHERCHE (Client-side)
       ========================================================= */
    function filterData() {
        const query = searchInput.value.toLowerCase();
        const cat = filterCat.value;
        const imp = filterImp.value.toLowerCase();

        const filtered = briefsData.filter(item => {
            const matchesSearch = !query || 
                (item.title && item.title.toLowerCase().includes(query)) || 
                (item.tldr && item.tldr.toLowerCase().includes(query));
            const matchesCat = !cat || item.category === cat;
            const matchesImp = !imp || (item.importance && item.importance.toLowerCase() === imp);
            
            return matchesSearch && matchesCat && matchesImp;
        });

        renderFeed(filtered);
    }

    function populateCategories() {
        categories.forEach(cat => {
            if (!cat) return;
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat; // textContent = safe
            filterCat.appendChild(option);
        });
    }

    /* =========================================================
       CHARGEMENT DES DONNÉES & CACHE
       ========================================================= */
    function applyData(data) {
        briefsData = data;
        // Tri par date (le plus récent en premier)
        briefsData.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
        
        // Extraction des catégories uniques
        briefsData.forEach(item => {
            if (item.category) categories.add(item.category);
        });
        
        populateCategories();
        renderFeed(briefsData);
    }

    function fallbackData() {
        // Données statiques de secours si hors-ligne et cache vide
        return [{
            id: "1", title: "MinuteBrief est prêt", tldr: "Ton nouveau média ultra-rapide est en ligne.",
            point1: "Vérifie l'ID de ton Google Sheet dans le code.",
            point2: "Assure-toi que ton Google Sheet est public.",
            point3: "Exporte au format CSV.",
            why_it_matters: "Cette carte s'affiche car la connexion au fichier CSV a échoué.",
            category: "Système", date: new Date().toISOString().split('T')[0], importance: "Moyenne"
        }];
    }

    async function loadData() {
        // 1. Essayer de charger depuis le LocalStorage (Cache) pour affichage instantané
        const cached = localStorage.getItem('minutebrief_cache');
        if (cached) {
            try { applyData(JSON.parse(cached)); } catch(e) {}
        }

        // 2. Fetch des données fraîches
        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error("Erreur réseau");
            
            const csvText = await response.text();
            
            // Vérification simple pour s'assurer que c'est bien un CSV et non une page HTML d'erreur Google
            if (csvText.trim().startsWith('<')) throw new Error("Le lien renvoie du HTML (Sheet privé ?)");

            const parsedData = parseCSV(csvText);
            
            // Mise à jour du cache
            localStorage.setItem('minutebrief_cache', JSON.stringify(parsedData));
            
            // Ré-appliquer les données fraîches silencieusement
            categories.clear();
            filterCat.innerHTML = '<option value="">Toutes les catégories</option>';
            applyData(parsedData);

        } catch (error) {
            console.error("Erreur de chargement:", error);
            if (!cached) {
                applyData(fallbackData());
            }
        }
    }

    /* =========================================================
       ÉCOUTEURS D'ÉVÉNEMENTS (Events & Toggles)
       ========================================================= */
    searchInput.addEventListener('input', filterData);
    filterCat.addEventListener('change', filterData);
    filterImp.addEventListener('change', filterData);

    // Toggle Mode 10 Secondes
    btn10s.addEventListener('click', () => {
        document.body.classList.toggle('mode-10s');
        btn10s.classList.toggle('active');
    });

    // Toggle Dark Mode avec persistance LocalStorage
    btnDark.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        btnDark.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('minutebrief_theme', isDark ? 'dark' : 'light');
    });

    // Initialisation
    window.addEventListener('DOMContentLoaded', () => {
        // Appliquer le thème sauvegardé ou système
        const savedTheme = localStorage.getItem('minutebrief_theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.body.classList.add('dark-mode');
            btnDark.textContent = '☀️';
        }

        loadData();
    });

</script>
</body>
</html>
